name: Build add-on

on:
  workflow_call:
    inputs:
      addon:
        required: true
        type: string
      publish:
        required: true
        type: boolean
      version:
        description: 'Optional version override (default is "dev")'
        required: false
        type: string
        default: 'dev'
      is_release:
        description: 'Optional whether this is a release (adds latest tag, default is false)'
        required: false
        type: boolean
        default: false

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
      build_matrix: ${{ steps.matrix.outputs.matrix }}
      image_name: ${{ steps.normalize.outputs.image_name }}
      name: ${{ steps.normalize.outputs.name }}
      description: ${{ steps.normalize.outputs.description }}
      url: ${{ steps.normalize.outputs.url }}
      registry_prefix: ${{ steps.normalize.outputs.registry_prefix }}
      version: ${{ steps.normalize.outputs.version }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.2

      - name: Get add-on info
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ inputs.addon }}"

      - name: Normalize outputs
        id: normalize
        shell: bash
        env:
          ADDON_NAME: ${{ steps.info.outputs.name }}
          ADDON_DESCRIPTION: ${{ steps.info.outputs.description }}
          ADDON_URL: ${{ steps.info.outputs.url }}
          ADDON_IMAGE: ${{ steps.info.outputs.image }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          strip_wrapping_quotes() {
            local VALUE="$1"
            VALUE="${VALUE#\"}"
            VALUE="${VALUE%\"}"
            echo "${VALUE}"
          }

          ADDON_NAME_CLEAN="$(strip_wrapping_quotes "${ADDON_NAME}")"
          ADDON_DESCRIPTION_CLEAN="$(strip_wrapping_quotes "${ADDON_DESCRIPTION}")"
          ADDON_URL_CLEAN="$(strip_wrapping_quotes "${ADDON_URL}")"
          ADDON_IMAGE_CLEAN="$(strip_wrapping_quotes "${ADDON_IMAGE}")"
          INPUT_VERSION_CLEAN="$(strip_wrapping_quotes "${INPUT_VERSION}")"

          REGISTRY_PREFIX=$(echo "${ADDON_IMAGE_CLEAN}" | cut -d'/' -f1-2)
          IMAGE_NAME=$(echo "${ADDON_IMAGE_CLEAN}" | cut -d'/' -f3-)

          {
            echo "image_name=${IMAGE_NAME}"
            echo "name<<EOF"
            echo "${ADDON_NAME_CLEAN}"
            echo "EOF"
            echo "description<<EOF"
            echo "${ADDON_DESCRIPTION_CLEAN}"
            echo "EOF"
            echo "url<<EOF"
            echo "${ADDON_URL_CLEAN}"
            echo "EOF"
            echo "registry_prefix=${REGISTRY_PREFIX}"
            echo "version=${INPUT_VERSION_CLEAN}"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: ${{ steps.normalize.outputs.image_name }}
          registry-prefix: ${{ steps.normalize.outputs.registry_prefix }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.2

      - name: Login to GitHub Container Registry
        if: inputs.publish
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          build-args: |
            BUILD_NAME=${{ needs.prepare.outputs.name }}
            BUILD_DESCRIPTION=${{ needs.prepare.outputs.description }}
            BUILD_REPO=${{ github.repository }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            BUILD_REF=${{ github.sha }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: "./${{ inputs.addon }}"
          cosign: ${{ inputs.publish }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            ${{ inputs.is_release && 'latest' || '' }}
          labels: |
            io.hass.type="addon"
            io.hass.name="${{ needs.prepare.outputs.name }}"
            io.hass.description="${{ needs.prepare.outputs.description }}"
            io.hass.url="${{ needs.prepare.outputs.url || '' }}"
          push: ${{ inputs.publish }}
          version: ${{ needs.prepare.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    needs: [prepare, build]
    if: inputs.publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ needs.prepare.outputs.architectures }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ needs.prepare.outputs.image_name }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            ${{ inputs.is_release && 'latest' || '' }}
          registry-prefix: ${{ needs.prepare.outputs.registry_prefix }}
