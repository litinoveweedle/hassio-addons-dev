name: Release

on:
  workflow_dispatch:
    inputs:
      addon:
        description: 'Choose addon to publish'
        required: true
        type: string
      version:
        description: 'Version to publish, default "dev" if empty'
        required: false
        type: string

permissions:
  contents: read

jobs:
  init:
    runs-on: ubuntu-latest
    name: Initialize builds
    outputs:
      changed_addons: ${{ steps.changed_addons.outputs.addons }}
      changed: ${{ steps.changed_addons.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.2
        
      - name: Find add-on directories
        id: get_addons
        uses: home-assistant/actions/helpers/find-addons@master

      - name: Get changed add-ons
        id: changed_addons
        run: |
          declare -a changed_addons
          for addon in ${{ steps.get_addons.outputs.addons }}; do
            if [[ "${{ inputs.addon }}" =~ ^${addon} ]]; then
              if [[ ! "${changed_addons[@]}" =~ $addon ]]; then
                changed_addons+=("\"${addon}\",");
              fi
            fi
          done

          changed=$(echo ${changed_addons[@]} | rev | cut -c 2- | rev)

          if [[ -n ${changed} ]]; then
            echo "Changed add-ons: $changed";
            echo "changed=true" >> $GITHUB_OUTPUT;
            echo "addons=[$changed]" >> $GITHUB_OUTPUT;
          else
            echo "No add-on with given name found (${{ inputs.addon }})";
          fi

      - name: Compute version and release flag
        id: version
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          if [[ -n "${INPUT_VERSION}" && "${INPUT_VERSION}" =~ ^[0-9]+\.[0-9]+ ]]; then
            echo "version=${INPUT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          elif [[ -z "${INPUT_VERSION}" ]]; then
            echo "version=dev" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Invalid version format: ${INPUT_VERSION}"
            exit 1
          fi

  build:
    name: Build ${{ matrix.addon }}
    needs: init
    if: needs.init.outputs.changed == 'true'
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJson(needs.init.outputs.changed_addons) }}
    uses: ./.github/workflows/build-addon.yaml
    with:
      addon: ${{ matrix.addon }}
      version: ${{ needs.init.outputs.version }}
      publish: true
      release: ${{ needs.init.outputs.is_release == 'true' }}
    secrets: inherit
            